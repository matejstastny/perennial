name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Export Godot project
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz"
          relative_project_path: "./"
          use_preset_export_path: true

      - name: Patch for GitHub Pages COOP/COEP headers
        run: |
          curl -sL https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js \
            -o dist/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' dist/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
